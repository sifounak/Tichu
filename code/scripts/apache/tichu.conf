# REQ-F-DS09: Apache reverse proxy config for /tichu
# REQ-NF-DS03: Consistent paths
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
#   sudo systemctl restart apache2
#
# Install:
#   sudo cp tichu.conf /etc/apache2/sites-available/
#   Then include it in your existing vhost or enable it directly:
#   sudo a2ensite tichu
#   sudo systemctl reload apache2
#
# This snippet is meant to go INSIDE an existing <VirtualHost *:443> block
# that already has SSL configured for sifounakis.com.

# ─── WebSocket upgrade (must come before ProxyPass rules) ────────────────
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/tichu/ws$ ws://localhost:3001/ws [P,L]

# ─── API proxy (/tichu/api -> :3001/api) ─────────────────────────────────
ProxyPass /tichu/api http://localhost:3001/api
ProxyPassReverse /tichu/api http://localhost:3001/api

# ─── Client proxy (all other /tichu/* -> :3000/tichu/*) ──────────────────
ProxyPass /tichu http://localhost:3000/tichu
ProxyPassReverse /tichu http://localhost:3000/tichu
