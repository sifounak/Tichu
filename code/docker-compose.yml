services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tichu
      POSTGRES_PASSWORD: tichu
      POSTGRES_DB: tichu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tichu"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://tichu:tichu@db:5432/tichu
      PORT: "3001"
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NODE_ENV: development
    depends_on:
      - server

volumes:
  pgdata:
